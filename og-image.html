<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&family=Outfit:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden;
    font-family: "Noto Serif JP", serif; color: #fff;
    background: linear-gradient(135deg, #241619 0%, #5e2a2e 55%, #8a3b3f 100%);
    position: relative; }
  .wrap { position: absolute; inset: 0; padding: 74px 84px; display: flex; flex-direction: column; justify-content: space-between; }
  .glow { position: absolute; inset: 0; background: radial-gradient(60% 120% at 92% 2%, rgba(199,154,85,.28) 0%, transparent 55%); }
  .en { font-family: "Outfit", sans-serif; font-weight: 600; letter-spacing: .26em; text-transform: uppercase; color: #c79a55; font-size: 26px; position: relative; }
  .name { font-weight: 700; font-size: 96px; letter-spacing: .04em; line-height: 1.1; margin: 10px 0 0; position: relative; }
  .tag { font-weight: 600; font-size: 38px; letter-spacing: .04em; color: #f2e6e6; position: relative; }
  .bar { width: 96px; height: 6px; border-radius: 6px; background: linear-gradient(90deg, #c79a55, #b0787c); margin: 22px 0 26px; position: relative; }
  .foot { display: flex; justify-content: space-between; align-items: flex-end; position: relative; }
  .foot .area { font-family: "Outfit", sans-serif; font-weight: 500; letter-spacing: .18em; color: #d4b9b9; font-size: 24px; }
  .foot .yrs { font-family: "Outfit", sans-serif; font-weight: 600; font-size: 28px; color: #fff; border: 1.5px solid rgba(199,154,85,.6); border-radius: 999px; padding: 10px 26px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div>
      <div class="en">Okegawa · Saitama</div>
      <div class="name">マルタカ工務店株式会社</div>
    </div>
    <div>
      <div class="bar"></div>
      <div class="tag">新築・リフォーム・改築 ― 住宅から店舗・工場まで</div>
    </div>
    <div class="foot">
      <div class="area">OKEGAWA · SAITAMA</div>
      <div class="yrs">Home · Store · Factory</div>
    </div>
  </div>
</body>
</html>
